name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./Dockerfile.frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/inventory-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/inventory-frontend:${{ github.sha }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./Dockerfile.backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/inventory-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/inventory-backend:${{ github.sha }}

      - name: Update image tags in Kubernetes manifests
        run: |
          sed -i -E "s|dharunr257/inventory-frontend:[a-zA-Z0-9_.-]+|dharunr257/inventory-frontend:${{ github.sha }}|g" k8s/deployment-frontend.yaml
          sed -i -E "s|dharunr257/inventory-backend:[a-zA-Z0-9_.-]+|dharunr257/inventory-backend:${{ github.sha }}|g" k8s/deployment-backend.yaml

      - name: Commit and push manifest updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment-frontend.yaml k8s/deployment-backend.yaml
          git commit -m "chore: update image tags to ${{ github.sha }} [skip ci]" || echo "No changes to commit"
          git push origin main
